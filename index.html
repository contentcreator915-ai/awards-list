<style>
:root{
  --ink:#1C2422; --teal:#0E4B45; --teal-soft:#E4EEEC; --brass:#B08A2E; --brass-soft:#F5EDD8;
  --paper:#FAF8F2; --card:#FFFFFF; --line:#E2DFD5; --muted:#8A8577; --body-mut:#565248;
  --open:#1E7A4F; --open-soft:#E5F3EB; --closed:#8A8577; --closed-soft:#EFEDE6; --alert:#A3492A; --alert-soft:#F6E7E0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;min-height:100vh}
.disp{font-family:'Fraunces',Georgia,serif}
[dir="rtl"] .disp{font-family:'Amiri','IBM Plex Sans Arabic',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:var(--card);width:100%}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
a{color:inherit}
/* header */
header{background:var(--teal);color:#F4F1E6}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
.head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding-top:22px}
.eyebrow{letter-spacing:.18em;font-size:11px;opacity:.75;text-transform:uppercase}
h1.disp{font-size:34px;line-height:1.15;margin-top:4px;color:#F8F3E3}
[dir="rtl"] h1.disp{font-size:40px}
.lang-btn{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:500;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#F4F1E6}
.ticker{display:flex;gap:8px;overflow-x:auto;padding:14px 0 6px;align-items:center;-webkit-overflow-scrolling:touch}
.ticker-label{font-size:11px;color:var(--brass);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.ticker button{padding:6px 12px;border-radius:999px;font-size:12px;white-space:nowrap;background:rgba(255,255,255,.10);color:#FBF7EC;border:1px solid rgba(255,255,255,.18)}
.ticker button.hot{background:var(--alert)}
nav.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px}
nav.tabs button{padding:9px 16px;font-size:14px;font-weight:500;border-radius:10px 10px 0 0;color:rgba(244,241,230,.75)}
nav.tabs button[aria-selected="true"]{background:var(--paper);color:var(--teal)}
/* filter bar */
.filters{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 0;display:flex;flex-direction:column;gap:8px}
.filters .row{display:flex;gap:8px;flex-wrap:wrap}
.filters select{width:auto;flex:1;min-width:130px}
.count{font-size:12px;color:var(--muted);margin:10px 0 2px}
/* cards */
.grid{display:grid;grid-template-columns:1fr;gap:14px;padding:10px 0 40px}
@media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}
.card{display:flex;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:box-shadow .18s,transform .18s}
.card:hover{box-shadow:0 6px 24px rgba(28,36,34,.10);transform:translateY(-2px)}
@media(prefers-reduced-motion:reduce){.card,.card:hover{transition:none;transform:none}}
.spine{width:7px;flex-shrink:0}
.card-body{flex:1;padding:16px;min-width:0}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11px;color:var(--muted)}
.chip{padding:2px 9px;border-radius:999px;font-weight:500}
h3.disp{font-size:19px;line-height:1.25;margin-top:6px}
[dir="rtl"] h3.disp{font-size:22px}
.org{font-size:12px;color:var(--muted);margin-top:2px}
.desc{font-size:14px;color:#43413A;margin-top:8px}
.val{font-size:14px;font-weight:600;color:var(--teal);margin-top:8px}
.dates{display:flex;flex-wrap:wrap;gap:4px 16px;font-size:12px;color:var(--body-mut);margin-top:8px}
.dleft{font-weight:600}
.detail{border-top:1px dashed var(--line);margin-top:12px;padding-top:12px;font-size:14px;display:grid;gap:8px}
.detail .k{font-weight:600}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.btn{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:500;text-decoration:none;display:inline-block}
.btn-teal{background:var(--teal);color:#F4F1E6}.btn-soft{background:var(--teal-soft);color:var(--teal)}
.btn-brass{background:var(--brass-soft);color:#7A5E17}.btn-danger{background:var(--alert-soft);color:var(--alert)}
.btn-line{border:1px solid var(--line)}
.bookmark{width:36px;height:36px;border-radius:50%;font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--paper);color:#B7B2A3}
.bookmark.on{background:var(--brass-soft);color:#7A5E17;border-color:var(--brass)}
.card-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
/* form */
.form-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px}
.form-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.form-grid{grid-template-columns:1fr 1fr}}
label.f{font-size:12px;font-weight:500;color:var(--body-mut);display:block}
label.f input,label.f select,label.f textarea{margin-top:4px}
.full{grid-column:1/-1}
.note{font-size:13px;color:var(--body-mut);max-width:640px;margin-top:8px;line-height:1.6}
.warn{background:var(--brass-soft);color:#7A5E17;border:1px solid var(--brass);border-radius:12px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.admin-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;flex-wrap:wrap;margin-top:8px}
.admin-row .nm{font-size:14px;font-weight:600}
.admin-row .vf{font-size:11px;color:var(--muted)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:48px 0}
footer{text-align:center;font-size:12px;color:var(--muted);padding:0 16px 34px}
h2.disp{font-size:24px;color:var(--teal);margin-top:20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#F4F1E6;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
.toast.show{opacity:1}
</style>
</head>

</header>

<main class="wrap" id="main"></main>

function loadState(){
  if(!storageOK)return;
  try{custom=JSON.parse(localStorage.getItem("diwan-custom")||"[]");}catch(e){custom=[];}
  try{bookmarks=JSON.parse(localStorage.getItem("diwan-bookmarks")||"[]");}catch(e){bookmarks=[];}
  try{lang=localStorage.getItem("diwan-lang")||"en";}catch(e){}
}
function persist(){
  if(!storageOK)return;
  try{localStorage.setItem("diwan-custom",JSON.stringify(custom));localStorage.setItem("diwan-bookmarks",JSON.stringify(bookmarks));localStorage.setItem("diwan-lang",lang);}catch(e){}
}
function t(k){return T[k]?T[k][lang]:k;}
function all(){return BUILT_IN.concat(custom);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* =============== LOGIC =============== */
function statusOf(a){
  const now=new Date();
  const o=a.open?new Date(a.open+"T00:00:00"):null, c=a.close?new Date(a.close+"T23:59:59"):null;
  if(c&&now>c)return"closed";
  if(o&&now<o)return"upcoming";
  if(c)return"open";
  if(o&&!c)return now>=o?"open":"upcoming";
  return"check";
}
function daysLeft(a){
  if(!a.close)return null;
  const d=Math.ceil((new Date(a.close+"T23:59:59")-new Date())/86400000);
  return d>=0?d:null;
}
function fmtD(iso){
  if(!iso)return"—";
  try{return new Date(iso+"T12:00:00").toLocaleDateString(lang==="ar"?"ar-AE":"en-GB",{day:"numeric",month:"short",year:"numeric"});}catch(e){return iso;}
}
function valueRank(a){
  const s=(a.valueEn||"").replace(/,/g,"");
  const m=s.match(/(\d+(?:\.\d+)?)\s*M/i); if(m)return parseFloat(m[1])*1e6;
  const n=s.match(/(\d{3,})/); return n?parseInt(n[1],10):0;
}
function downloadICS(id){
  const a=all().find(x=>x.id===id); if(!a||!a.close)return;
  const dt=a.close.replace(/-/g,"");
  const title=(lang==="ar"?"موعد إغلاق: "+a.nameAr:"Deadline: "+a.nameEn);
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//DiwanOfPrizes//EN","BEGIN:VEVENT","UID:"+a.id+"-"+dt+"@diwan","DTSTART;VALUE=DATE:"+dt,"SUMMARY:"+title,"DESCRIPTION:"+(a.link||""),"BEGIN:VALARM","TRIGGER:-P7D","ACTION:DISPLAY","DESCRIPTION:"+title,"END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n");
  const u=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
  const el=document.createElement("a");el.href=u;el.download=a.id+"-deadline.ics";el.click();URL.revokeObjectURL(u);
}
function toast(msg){
  const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2200);
}

/* =============== ACTIONS =============== */
function toggleLang(){lang=lang==="en"?"ar":"en";persist();render();}
function setTab(k){tab=k;expanded=null;editingId=null;render();}
function toggleBookmark(id){bookmarks=bookmarks.includes(id)?bookmarks.filter(x=>x!==id):bookmarks.concat(id);persist();render();}
function toggleExpand(id){expanded=expanded===id?null:id;render();}
function jumpTo(id){const a=all().find(x=>x.id===id);if(!a)return;tab=a.section;q="";fCountry="";fCat="";fStatus="";expanded=id;render();}
function delAward(id){custom=custom.filter(a=>a.id!==id);bookmarks=bookmarks.filter(b=>b!==id);persist();toast(t("deletedToast"));render();}
function editAward(id){editingId=id;tab="add";render();window.scrollTo({top:0});}
function exportPrizes(){
  const u=URL.createObjectURL(new Blob([JSON.stringify(custom,null,2)],{type:"application/json"}));
  const el=document.createElement("a");el.href=u;el.download="diwan-my-prizes.json";el.click();URL.revokeObjectURL(u);
}
function importPrizes(input){
  const f=input.files&&input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const arr=JSON.parse(r.result); if(!Array.isArray(arr))throw 0;
    let n=0;
    arr.forEach(a=>{if(a&&(a.nameEn||a.nameAr)){a.id=a.id||("custom-"+Date.now()+"-"+n);if(!custom.some(c=>c.id===a.id)){custom.push(a);n++;}}});
    persist();toast(n+" "+t("importedToast"));render();
  }catch(e){toast("Invalid file / ملف غير صالح");}};
  r.readAsText(f); input.value="";
}
function saveForm(){
  const g=id=>document.getElementById(id).value.trim();
  const nameEn=g("f-nameEn"),nameAr=g("f-nameAr");
  if(!nameEn&&!nameAr){toast(t("nameReq"));return;}
  const a={
    id:editingId||("custom-"+Date.now()),
    section:g("f-section"),country:g("f-country"),category:g("f-category"),
    nameEn:nameEn||nameAr,nameAr:nameAr||nameEn,
    orgEn:g("f-org"),orgAr:g("f-org"),
    valueEn:g("f-value"),valueAr:g("f-value"),
    eligEn:g("f-elig"),eligAr:g("f-elig"),
    open:g("f-open")||null,close:g("f-close")||null,
    announce:g("f-announce"),link:g("f-link"),
    descEn:g("f-desc"),descAr:g("f-desc"),
    verified:new Date().toISOString().slice(0,10),custom:true
  };
  custom=custom.filter(c=>c.id!==a.id).concat(a);
  persist();editingId=null;toast(t("savedToast"));
  tab=a.section;expanded=a.id;render();
}

/* =============== RENDER =============== */
function chipStyle(st){
  if(st==="open")return"background:var(--open-soft);color:var(--open)";
  if(st==="upcoming")return"background:var(--brass-soft);color:#7A5E17";
  if(st==="closed")return"background:var(--closed-soft);color:var(--closed)";
  return"background:var(--teal-soft);color:var(--teal)";
}
function spineColor(st){
  if(st==="open")return"var(--open)";if(st==="upcoming")return"var(--brass)";
  if(st==="closed")return"var(--closed)";return"var(--teal)";
}
function cardHTML(a){
  const st=statusOf(a),d=daysLeft(a),marked=bookmarks.includes(a.id),isOpen=expanded===a.id;
  const name=lang==="ar"?a.nameAr:a.nameEn, org=lang==="ar"?a.orgAr:a.orgEn;
  const desc=lang==="ar"?a.descAr:a.descEn, val=lang==="ar"?a.valueAr:a.valueEn, elig=lang==="ar"?a.eligAr:a.eligEn;
  return `<article class="card">
    <div class="spine" style="background:linear-gradient(180deg,${spineColor(st)},${spineColor(st)} 60%,var(--brass))"></div>
    <div class="card-body">
      <div class="card-head"><div style="min-width:0">
        <div class="meta">
          <span class="chip" style="${chipStyle(st)}">${t(st)}${st==="open"&&d!==null&&d<=14?" · "+t("closingSoon"):""}</span>
          <span>${(COUNTRIES[a.country]||{})[lang]||esc(a.country)}</span><span>·</span>
          <span>${(CATEGORIES[a.category]||{})[lang]||esc(a.category)}</span>
          ${a.custom?`<span class="chip" style="background:var(--brass-soft);color:#7A5E17">${t("custom")}</span>`:""}
        </div>
        <h3 class="disp">${esc(name)}</h3>
        <div class="org">${esc(org)}</div>
      </div>
      <button class="bookmark${marked?" on":""}" aria-pressed="${marked}" aria-label="${t("save")}" onclick="toggleBookmark('${a.id}')">${marked?"★":"☆"}</button></div>
      <p class="desc">${esc(desc)}</p>
      <div class="val">${esc(val)}</div>
      <div class="dates">
        <span>${t("windowLbl")}: ${fmtD(a.open)} → ${fmtD(a.close)}</span>
        ${st==="open"&&d!==null?`<span class="dleft" style="color:${d<=14?"var(--alert)":"var(--open)"}">${d} ${t("daysLeft")}</span>`:""}
      </div>
      ${isOpen?`<div class="detail">
        <div><span class="k">${t("eligibility")}: </span>${esc(elig)||"—"}</div>
        <div><span class="k">${t("announce")}: </span>${esc(a.announce)||"—"}</div>
        <div style="font-size:11px;color:var(--muted)">${t("verifiedOn")}: ${esc(a.verified)||"—"}</div>
      </div>`:""}
      <div class="actions">
        <button class="btn btn-soft" onclick="toggleExpand('${a.id}')">${isOpen?"−":"+"} ${t("details")}</button>
        ${a.close&&st!=="closed"?`<button class="btn btn-brass" onclick="downloadICS('${a.id}')">🗓 ${t("calendar")}</button>`:""}
        ${a.link?`<a class="btn btn-teal" href="${esc(a.link)}" target="_blank" rel="noopener noreferrer">${t("apply")} ↗</a>`:""}
        ${a.custom?`<button class="btn btn-line" onclick="editAward('${a.id}')">${t("edit")}</button><button class="btn btn-danger" onclick="delAward('${a.id}')">${t("del")}</button>`:""}
      </div>
    </div></article>`;
}
function directoryHTML(){
  let list=all();
  if(tab==="arabic"||tab==="english")list=list.filter(a=>a.section===tab);
  if(tab==="saved")list=list.filter(a=>bookmarks.includes(a.id));
  if(fCountry)list=list.filter(a=>a.country===fCountry);
  if(fCat)list=list.filter(a=>a.category===fCat);
  if(fStatus)list=list.filter(a=>statusOf(a)===fStatus);
  if(q.trim()){const s=q.trim().toLowerCase();list=list.filter(a=>[a.nameEn,a.nameAr,a.orgEn,a.orgAr,a.descEn,a.descAr].join(" ").toLowerCase().includes(s));}
  const rank={open:0,upcoming:1,check:2,closed:3};
  list.sort((a,b)=>{
    if(sort==="name")return(lang==="ar"?a.nameAr:a.nameEn).localeCompare(lang==="ar"?b.nameAr:b.nameEn,lang);
    if(sort==="value")return valueRank(b)-valueRank(a);
    const sa=statusOf(a),sb=statusOf(b);
    if(rank[sa]!==rank[sb])return rank[sa]-rank[sb];
    return new Date(a.close||"2999-01-01")-new Date(b.close||"2999-01-01");
  });
  const opts=(obj,sel,allLbl)=>`<option value="">${allLbl}</option>`+Object.keys(obj).map(k=>`<option value="${k}"${sel===k?" selected":""}>${obj[k][lang]}</option>`).join("");
  return `
  <div class="filters">
    <input value="${esc(q)}" placeholder="${t("search")}" aria-label="${t("search")}" oninput="q=this.value;renderList()">
    <div class="row">
      <select onchange="fCountry=this.value;render()">${opts(COUNTRIES,fCountry,t("allCountries"))}</select>
      <select onchange="fCat=this.value;render()">${opts(CATEGORIES,fCat,t("allCategories"))}</select>
      <select onchange="fStatus=this.value;render()"><option value="">${t("allStatus")}</option>
        <option value="open"${fStatus==="open"?" selected":""}>${t("open")}</option>
        <option value="upcoming"${fStatus==="upcoming"?" selected":""}>${t("upcoming")}</option>
        <option value="closed"${fStatus==="closed"?" selected":""}>${t("closed")}</option></select>
      <select onchange="sort=this.value;render()">
        <option value="deadline"${sort==="deadline"?" selected":""}>${t("sortDeadline")}</option>
        <option value="name"${sort==="name"?" selected":""}>${t("sortName")}</option>
        <option value="value"${sort==="value"?" selected":""}>${t("sortValue")}</option></select>
    </div>
  </div>
  <div class="count">${list.length} ${t("results")}</div>
  ${list.length===0?`<div class="empty">${tab==="saved"?t("emptySaved"):t("noResults")}</div>`:`<div class="grid">${list.map(cardHTML).join("")}</div>`}`;
}
function fieldRow(id,label,val,type){
  if(type==="date")return`<label class="f">${label}<input type="date" id="${id}" value="${esc(val)}"></label>`;
  if(type==="area")return`<label class="f full">${label}<textarea id="${id}" rows="2">${esc(val)}</textarea></label>`;
  return`<label class="f">${label}<input id="${id}" value="${esc(val)}"></label>`;
}
function addHTML(){
  const e=editingId?custom.find(c=>c.id===editingId)||{}:{};
  const selOpts=(obj,sel)=>Object.keys(obj).map(k=>`<option value="${k}"${(sel||"")===k?" selected":""}>${obj[k][lang]}</option>`).join("");
  return `
  <h2 class="disp">${t("addTitle")}</h2>
  <p class="note">${t("addNote")}</p>
  <div class="warn" style="display:${storageOK?"none":"block"}">${t("storageWarn")}</div>
  <div class="form-card"><div class="form-grid">
    ${fieldRow("f-nameEn",t("nameEnL"),e.nameEn||"")}
    ${fieldRow("f-nameAr",t("nameArL"),e.nameAr||"")}
    ${fieldRow("f-org",t("orgL"),e.orgEn||"")}
    <label class="f">${t("sectionL")}<select id="f-section">
      <option value="arabic"${e.section!=="english"?" selected":""}>${t("tabArabic")}</option>
      <option value="english"${e.section==="english"?" selected":""}>${t("tabEnglish")}</option></select></label>
    <label class="f">${t("countryL")}<select id="f-country">${selOpts(COUNTRIES,e.country||"AE")}</select></label>
    <label class="f">${t("categoryL")}<select id="f-category">${selOpts(CATEGORIES,e.category||"literature")}</select></label>
    ${fieldRow("f-value",t("valueL"),e.valueEn||"")}
    ${fieldRow("f-link",t("linkL"),e.link||"")}
    ${fieldRow("f-open",t("openL"),e.open||"","date")}
    ${fieldRow("f-close",t("closeL"),e.close||"","date")}
    ${fieldRow("f-announce",t("announceL"),e.announce||"")}
    <div></div>
    ${fieldRow("f-elig",t("eligL"),e.eligEn||"","area")}
    ${fieldRow("f-desc",t("descL"),e.descEn||"","area")}
    <div class="full" style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-teal" style="font-size:14px;padding:10px 18px" onclick="saveForm()">${t("saveAward")}</button>
      ${editingId?`<button class="btn btn-line" style="font-size:14px;padding:10px 18px" onclick="editingId=null;render()">${t("cancel")}</button>`:""}
    </div>
  </div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;align-items:center">
    <button class="btn btn-brass" onclick="exportPrizes()">${t("exportBtn")}</button>
    <label class="btn btn-line" style="cursor:pointer">${t("importBtn")}<input type="file" accept=".json" style="display:none" onchange="importPrizes(this)"></label>
  </div>
  ${custom.length?`<h2 class="disp" style="font-size:19px">${t("yourPrizes")} (${custom.length})</h2>`+custom.map(a=>`
    <div class="admin-row"><div style="min-width:0">
      <div class="nm">${esc(lang==="ar"?a.nameAr:a.nameEn)}</div>
      <div class="vf">${t("verifiedOn")}: ${esc(a.verified)||"—"} · ${t(statusOf(a))}</div></div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn btn-soft" onclick="editAward('${a.id}')">${t("edit")}</button>
        <button class="btn btn-danger" onclick="delAward('${a.id}')">${t("del")}</button></div></div>`).join(""):""}`;
}
function render(){
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==="ar"?"rtl":"ltr";
  document.getElementById("appname").textContent=t("appName");
  document.getElementById("tagline").textContent=t("tagline");
  document.getElementById("langBtn").textContent=lang==="en"?"العربية":"English";
  document.getElementById("footer").textContent=t("disclaimer");
  /* ticker */
  const soon=all().map(a=>({a,d:daysLeft(a),s:statusOf(a)})).filter(x=>x.s==="open"&&x.d!==null).sort((x,y)=>x.d-y.d).slice(0,4);
  document.getElementById("ticker").innerHTML=soon.length?`<span class="ticker-label">${t("deadlines")}</span>`+soon.map(({a,d})=>
    `<button class="${d<=14?"hot":""}" onclick="jumpTo('${a.id}')">${esc((lang==="ar"?a.nameAr:a.nameEn).split("(")[0].trim())} · ${d} ${t("daysLeft")}</button>`).join(""):"";
  /* tabs */
  const tabs=[["arabic",t("tabArabic")],["english",t("tabEnglish")],["saved",t("tabSaved")+(bookmarks.length?" ("+bookmarks.length+")":"")],["add",t("tabAdd")]];
  document.getElementById("tabs").innerHTML=tabs.map(([k,l])=>`<button role="tab" aria-selected="${tab===k}" onclick="setTab('${k}')">${l}</button>`).join("");
  /* main */
  document.getElementById("main").innerHTML=tab==="add"?addHTML():directoryHTML();
}
function renderList(){ /* re-render only the results while typing, keep input focus */
  const container=document.getElementById("main");
  const old=container.querySelector(".count"); if(!old){render();return;}
  let list=all();
  if(tab==="arabic"||tab==="english")list=list.filter(a=>a.section===tab);
  if(tab==="saved")list=list.filter(a=>bookmarks.includes(a.id));
  if(fCountry)list=list.filter(a=>a.country===fCountry);
  if(fCat)list=list.filter(a=>a.category===fCat);
  if(fStatus)list=list.filter(a=>statusOf(a)===fStatus);
  if(q.trim()){const s=q.trim().toLowerCase();list=list.filter(a=>[a.nameEn,a.nameAr,a.orgEn,a.orgAr,a.descEn,a.descAr].join(" ").toLowerCase().includes(s));}
  const rank={open:0,upcoming:1,check:2,closed:3};
  list.sort((a,b)=>{
    if(sort==="name")return(lang==="ar"?a.nameAr:a.nameEn).localeCompare(lang==="ar"?b.nameAr:b.nameEn,lang);
    if(sort==="value")return valueRank(b)-valueRank(a);
    const sa=statusOf(a),sb=statusOf(b);
    if(rank[sa]!==rank[sb])return rank[sa]-rank[sb];
    return new Date(a.close||"2999-01-01")-new Date(b.close||"2999-01-01");
  });
  old.textContent=list.length+" "+t("results");
  const gridOrEmpty=container.querySelector(".grid, .empty");
  if(gridOrEmpty){
    const div=document.createElement("div");
    div.innerHTML=list.length===0?`<div class="empty">${tab==="saved"?t("emptySaved"):t("noResults")}</div>`:`<div class="grid">${list.map(cardHTML).join("")}</div>`;
    gridOrEmpty.replaceWith(div.firstChild);
  }
}
loadState();render();
/* PWA: register the service worker when served over http(s).
   Silently skipped when the file is opened directly (file://), so the
   same file still works double-clicked without hosting. */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
